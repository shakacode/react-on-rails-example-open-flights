# Keys beginning with "cpln_" correspond to your settings in Control Plane.
#
# This demo uses PostgreSQL in production, so the Control Plane setup keeps a
# stateful Postgres workload alongside the Rails workload.

allow_org_override_by_env: true
allow_app_override_by_env: true

aliases:
  common: &common
    cpln_org: my-org-staging
    default_location: aws-us-east-2
    setup_app_templates:
      - app
      - postgres
      - rails

    one_off_workload: rails
    app_workloads:
      - rails
    additional_workloads:
      - postgres

    maintenance_workload: maintenance
    release_script: release_script.sh

    stale_app_image_deployed_days: 5
    image_retention_days: 7

  production: &production
    <<: *common
    allow_org_override_by_env: false
    allow_app_override_by_env: false
    cpln_org: my-org-production
    upstream: react-on-rails-open-flights-example-staging

apps:
  react-on-rails-open-flights-example-staging:
    <<: *common

  react-on-rails-open-flights-example-review:
    <<: *common
    match_if_app_name_starts_with: true

  react-on-rails-open-flights-example-production:
    <<: *production
